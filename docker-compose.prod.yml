# Production Docker Compose for a local/on-premise server.
# Assumes a shared Traefik instance is already running on network "traefik-public".
# To start Traefik for the first time, run:
#   docker compose -f docker-compose.traefik.yml up -d
#
# Deploy this project:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# To run parsing manually:
#   docker compose -f docker-compose.prod.yml exec api php artisan import:images --type=products

services:
  db:
    image: postgres:16-alpine
    container_name: gb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gb-redis
    restart: unless-stopped
    networks:
      - gb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: gb-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
    volumes:
      - meilisearchdata:/meili_data
    networks:
      - gb-network

  minio:
    image: minio/minio:latest
    container_name: gb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    networks:
      - gb-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.gb-minio.rule=Host(`s3.${DOMAIN}`)
      - traefik.http.routers.gb-minio.entrypoints=web
      - traefik.http.routers.gb-minio.service=gb-minio
      - traefik.http.services.gb-minio.loadbalancer.server.port=9000
      - traefik.http.routers.gb-minio-console.rule=Host(`console.${DOMAIN}`)
      - traefik.http.routers.gb-minio-console.entrypoints=web
      - traefik.http.routers.gb-minio-console.service=gb-minio-console
      - traefik.http.services.gb-minio-console.loadbalancer.server.port=9001

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gb-api
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - ./api:/var/www/api
      - ./docker/prod/php.ini:/usr/local/etc/php/php.ini:ro
      - ./docker/prod/api-entrypoint.sh:/entrypoint.sh:ro
    working_dir: /var/www/api
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - gb-network

  nginx-api:
    image: nginx:alpine
    container_name: gb-nginx-api
    restart: unless-stopped
    volumes:
      - ./api/public:/var/www/api/public:ro
      - ./docker/prod/nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - gb-network
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.gb-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/`, `/admin/`, `/storage/`, `/livewire`, `/css/filament/`, `/js/filament/`, `/fonts/filament/`)
      - traefik.http.routers.gb-api.entrypoints=web
      - traefik.http.routers.gb-api.service=gb-api
      - traefik.http.services.gb-api.loadbalancer.server.port=80

  frontend:
    build:
      context: .
      dockerfile: docker/prod/frontend.Dockerfile
    container_name: gb-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      API_URL: http://nginx-api
    depends_on:
      - nginx-api
    networks:
      - gb-network
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.gb-frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.gb-frontend.entrypoints=web
      - traefik.http.routers.gb-frontend.service=gb-frontend
      - traefik.http.services.gb-frontend.loadbalancer.server.port=3000

volumes:
  pgdata:
  meilisearchdata:
  miniodata:

networks:
  gb-network:
    driver: bridge
  traefik-public:
    external: true
