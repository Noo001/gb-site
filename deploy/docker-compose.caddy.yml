services:
  db:
    image: postgres:16-alpine
    container_name: gb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shared-network
      - gb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gb-redis
    restart: unless-stopped
    networks:
      - shared-network
      - gb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: gb-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
    volumes:
      - meilisearchdata:/meili_data
    networks:
      - shared-network
      - gb-network

  minio:
    image: minio/minio:latest
    container_name: gb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - miniodata:/data
    networks:
      - shared-network
      - gb-network

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: gb-site-api
    container_name: gb-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DOMAIN: ${DOMAIN}
      APP_URL: https://${DOMAIN}
      FRONTEND_URL: https://${DOMAIN}
      SANCTUM_STATEFUL_DOMAINS: ${DOMAIN}
      MAIL_FROM_ADDRESS: noreply@${DOMAIN}
    volumes:
      - ./api:/var/www/api
      - ./docker/prod/php.ini:/usr/local/etc/php/php.ini:ro
      - ./docker/prod/api-entrypoint.sh:/entrypoint.sh:ro
    working_dir: /var/www/api
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - shared-network
      - gb-network

  nginx-api:
    image: nginx:alpine
    container_name: gb-nginx-api
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./api/public:/var/www/api/public:ro
      - ./docker/prod/nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - shared-network
      - gb-network

  adminer:
    image: adminer:latest
    container_name: gb-adminer
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - db
    networks:
      - shared-network
      - gb-network

  scheduler:
    image: gb-site-api
    container_name: gb-scheduler
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - ./api:/var/www/api
    working_dir: /var/www/api
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shared-network
      - gb-network

  frontend:
    build:
      context: .
      dockerfile: docker/prod/frontend.Dockerfile
    container_name: gb-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      API_URL: http://nginx-api
    expose:
      - "3000"
    depends_on:
      - nginx-api
    networks:
      - shared-network
      - gb-network

volumes:
  pgdata:
  meilisearchdata:
  miniodata:

networks:
  gb-network:
    driver: bridge
  shared-network:
    external: true
